name: Morning Trade Run

# Runs once every trading day (Mon-Fri) shortly after the open.
# Handles the full A/H 60/40 ensemble: Sleeve A limit entries + exits and Sleeve H
# momentum entries + exits, plus the account drawdown circuit breaker. Signals are
# computed from yesterday's completed bar and executed at today's open (fractional
# DAY orders), matching the backtest timing.
#
# SCHEDULE NOTE: GitHub Actions cron runs in UTC. This is set for EDT (UTC-4, ~Mar-Nov).
# When clocks fall back (EST, UTC-5, ~Nov-Mar), change the cron to: '35 14 * * 1-5'
# EDT: 13:35 UTC = 9:35 AM ET   |   EST: 14:35 UTC = 9:35 AM ET
# NOTE: scheduled runs can start several minutes late; momentum market orders may
# therefore fill a little off the 9:30 open (see PLAYBOOK §6).
#
# REQUIRED GITHUB SECRETS (Settings → Secrets and variables → Actions):
#   ALPACA_API_KEY     — Alpaca paper-trading API key (starts with PK...)
#   ALPACA_SECRET_KEY  — Alpaca paper-trading secret key

on:
  schedule:
    - cron: '35 13 * * 1-5'   # 9:35 AM EDT (UTC-4) — update to '35 14 * * 1-5' in November
  workflow_dispatch:           # allows manual trigger from the Actions tab

permissions:
  contents: write              # needed to commit journal + state back to the repo

concurrency:
  group: trade-run
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore cached market data
        uses: actions/cache@v4
        with:
          path: data/
          key: market-data-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            market-data-${{ runner.os }}-

      - name: Rebuild universe (S&P 500 + Russell 1000)
        run: python -m backtest.universe

      - name: Write .env from secrets
        run: |
          echo "ALPACA_API_KEY=${{ secrets.ALPACA_API_KEY }}" > .env
          echo "ALPACA_SECRET_KEY=${{ secrets.ALPACA_SECRET_KEY }}" >> .env

      - name: Run morning trade
        run: python -m papertrade.run_daily morning

      - name: Remove .env
        if: always()
        run: rm -f .env

      - name: Commit state and journal back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add papertrade/state.json papertrade/journal/
          git diff --staged --quiet && echo "Nothing to commit" || \
            git commit -m "Morning run $(date -u +%Y-%m-%d)" && git push
