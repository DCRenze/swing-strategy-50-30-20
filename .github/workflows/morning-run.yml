name: Morning Trade Run

# Runs once every trading day (Mon-Fri) shortly after the open.
# Handles the full A/H 60/40 ensemble: Sleeve A limit entries + exits and Sleeve H
# momentum entries + exits, plus the account drawdown circuit breaker. Signals are
# computed from yesterday's completed bar and executed at today's open (fractional
# DAY orders), matching the backtest timing.
#
# SCHEDULE NOTE: GitHub Actions cron runs in UTC. This is set for EDT (UTC-4, ~Mar-Nov).
# When clocks fall back (EST, UTC-5, ~Nov-Mar), change the cron to: '35 14 * * 1-5'
# EDT: 13:35 UTC = 9:35 AM ET   |   EST: 14:35 UTC = 9:35 AM ET
# NOTE: scheduled runs can start several minutes late; momentum market orders may
# therefore fill a little off the 9:30 open (see PLAYBOOK §6).
#
# REQUIRED GITHUB SECRETS (Settings → Secrets and variables → Actions):
#   ALPACA_API_KEY     — Alpaca paper-trading API key (starts with PK...)
#   ALPACA_SECRET_KEY  — Alpaca paper-trading secret key

on:
  # Triggered on time by an external scheduler (cron-job.org) via the GitHub API
  # at ~6:32 AM PT. GitHub's own `schedule:` cron runs late under load, and the
  # momentum sleeve needs to fill near the 6:30 AM PT open, so we removed the
  # built-in schedule to avoid double-runs. workflow_dispatch = API + manual runs.
  workflow_dispatch:

permissions:
  contents: write              # needed to commit journal + state back to the repo

concurrency:
  group: trade-run
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # No universe rebuild or data cache here: the committed data/universe.csv is
      # the source of tickers, and the screener downloads fresh recent bars each run.
      # This removes the fragile per-run Wikipedia scrape that once shrank the
      # universe to 506 names. Rebuild the universe monthly (see PLAYBOOK) and commit.

      - name: Write .env from secrets
        run: |
          echo "ALPACA_API_KEY=${{ secrets.ALPACA_API_KEY }}" > .env
          echo "ALPACA_SECRET_KEY=${{ secrets.ALPACA_SECRET_KEY }}" >> .env

      - name: Run morning trade
        run: python -m papertrade.run_daily morning

      - name: Remove .env
        if: always()
        run: rm -f .env

      - name: Commit state and journal back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # stage only the trade record; the run also regenerates data/ files we do
          # not commit, so sync with --autostash to set those aside during the pull.
          git add papertrade/state.json papertrade/journal/
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "Morning run $(date -u +%Y-%m-%d)"
            git pull --rebase --autostash origin main
            git push
          fi

      - name: Post morning report to Discord
        if: always()               # send even if an earlier step hiccupped
        continue-on-error: true     # a report failure must never fail the run
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python -m papertrade.report_discord morning
