name: End-of-Day Report

# Posts a plain-language wrap-up to Discord after the close every trading day:
# the day's index moves + VIX + regime, today's orders, and open-position P/L.
# READ-ONLY - it never trades. Self-contained (fetches its own SPY/QQQ/VIX), so
# it needs no market-data cache or universe rebuild.
#
# SCHEDULE NOTE: cron is UTC. Set for EDT (UTC-4, ~Mar-Nov) = 4:30 PM ET = 1:30 PM PT.
# When clocks fall back (EST, ~Nov-Mar), change the cron to: '30 21 * * 1-5'.
#
# REQUIRED GITHUB SECRETS (Settings → Secrets and variables → Actions):
#   ALPACA_API_KEY       — Alpaca paper key (starts with PK...)
#   ALPACA_SECRET_KEY    — Alpaca paper secret key
#   DISCORD_WEBHOOK_URL  — the Discord channel webhook URL

on:
  schedule:
    - cron: '30 20 * * 1-5'   # 4:30 PM EDT (UTC-4) — update to '30 21 * * 1-5' in November
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post end-of-day report to Discord
        continue-on-error: true
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python -m papertrade.report_discord eod
