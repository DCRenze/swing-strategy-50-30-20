name: Evening Trade Run

# Runs after market close every trading day (Mon-Fri).
# Handles: Sleeve A exits + new limit entries, Sleeve B calendar flags, Sleeve C regime check.
#
# SCHEDULE NOTE: GitHub Actions cron runs in UTC. This is set for EDT (UTC-4, ~Mar-Nov).
# When clocks fall back (EST, UTC-5, ~Nov-Mar), change the cron to: '0 22 * * 1-5'
# EDT schedule: 21:00 UTC = 5:00 PM ET
# EST schedule: 22:00 UTC = 5:00 PM ET
#
# REQUIRED GITHUB SECRETS (Settings → Secrets and variables → Actions → New repository secret):
#   ALPACA_API_KEY     — your Alpaca paper-trading API key (starts with PK...)
#   ALPACA_SECRET_KEY  — your Alpaca paper-trading secret key

on:
  schedule:
    - cron: '0 21 * * 1-5'   # 5:00 PM EDT (UTC-4) — update to '0 22 * * 1-5' in November
  workflow_dispatch:           # allows manual trigger from the Actions tab

permissions:
  contents: write              # needed to commit journal + state back to the repo

concurrency:
  group: trade-run             # prevent overlap with near-close run
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore cached market data
        uses: actions/cache@v4
        with:
          path: data/
          key: market-data-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            market-data-${{ runner.os }}-

      - name: Rebuild universe (S&P 500 + Russell 1000)
        run: python -m backtest.universe

      - name: Write .env from secrets
        run: |
          echo "ALPACA_API_KEY=${{ secrets.ALPACA_API_KEY }}" > .env
          echo "ALPACA_SECRET_KEY=${{ secrets.ALPACA_SECRET_KEY }}" >> .env

      - name: Run evening trade
        run: python -m papertrade.run_daily evening

      - name: Remove .env
        if: always()
        run: rm -f .env

      - name: Commit state and journal back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add papertrade/state.json papertrade/journal/
          git diff --staged --quiet && echo "Nothing to commit" || \
            git commit -m "Evening run $(date -u +%Y-%m-%d)" && git push
